<!DOCTYPE html>
<html lang="en">
<head>
   <!-- info web -->
    <meta charset="utf-8">
    <title>ℙ𝕝𝕒𝕪𝟜𝔽𝕣𝕖𝕖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHgyzv8FSxeufb6jEdvp8gYTFLZQ--lWpfwg&s">
    <link rel="stylesheet" type="text/css" media="screen" href="login.css">
</head>
<body>
    <header>
        <h2 class="logo"> 𝓟𝓵𝓪𝔂4𝓯𝓻𝓮𝓮 </h2>
        <nav class="navigation">
            <a href="#">home</a>
            <a href="#">about</a>
            <a href="#">survices</a>
            <a href="#">contact</a>
            <button class="btnLogin-popup">login</button>
        </nav>
    </header>
    
    <div class="wrapper">
        <div class="form-box login">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="mail"></ion-icon>
                    </span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox">Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="login-register">
                    <p>Don't have account? <a href="singin.html" class="register-link">Register</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <script src="login.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
